apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-chat-mort-is
  namespace: chat
spec:
  secretName: cert-chat-mort-is
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: chat.mort.is
  dnsNames:
  - mort.is
  - chat.mort.is
  - '*.chat.mort.is'
