apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: matrix
  namespace: chat
spec:
  interval: 12h
  url: oci://ghcr.io/element-hq/ess-helm/matrix-stack
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: extract
  ref:
    semver: "*"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-apps-matrix-synapse
  namespace: chat
spec:
  releaseName: matrix-synapse
  targetNamespace: chat
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: matrix
  values:
    ingress:
      annotations:
        nginx.ingress.kubernetes.io/upstream-vhost: "matrix.wl.mort.is"
      tlsEnabled: true
      className: "nginx-insecure"
    serverName: matrix.wl.mort.is
    synapse:
      ingress:
        host: matrix.wl.mort.is
    matrixAuthenticationService:
      enabled: false
    matrixRTC:
      enabled: false
    elementWeb:
      enabled: false
    wellKnownDelegation:
      enabled: false
    elementAdmin:
      enabled: false
