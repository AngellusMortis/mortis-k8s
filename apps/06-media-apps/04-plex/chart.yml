apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: plex
  namespace: media
spec:
  interval: 12h
  url: https://raw.githubusercontent.com/plexinc/pms-docker/gh-pages
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-apps-plex
  namespace: media
spec:
  releaseName: plex
  targetNamespace: media
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: plex-media-server
      version: "*"
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: plex
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Service
          name: plex-plex-media-server
        patch: |
          - op: replace
            path: /spec/ports
            value:
              - name: plex
                port: 32400
                protocol: TCP
                targetPort: plex
              - protocol: TCP
                port: 443
                targetPort: 32400
                name: plex-https
              - protocol: TCP
                port: 80
                targetPort: 32400
                name: plex-http
              - protocol: TCP
                port: 32499
                targetPort: 32499
                name: plex-tcp
  values:
    pms:
      storageClassName: longhorn
      configStorage: 500Gi
      resources:
        requests:
          cpu: 4000m
          memory: 3Gi
        limits:
          cpu: 24000m
          memory: 6Gi
    ingress:
      enabled: true
      ingressClassName: nginx-insecure
      url: plex.wl.mort.is
      tls:
        - hosts:
          - plex.wl.mort.is
          secretName: cert-plex-wl-mort-is
      annotations:
        nginx.ingress.kubernetes.io/upstream-vhost: "plex.wl.mort.is"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    service:
      type: LoadBalancer
      port: 443
      externalTrafficPolicy: Local
      annotations:
        metallb.universe.tf/loadBalancerIPs: 192.168.3.230
    nodeSelector:
      kubernetes.io/hostname: storage-1
    extraVolumeMounts:
    - name: ssl
      mountPath: /ssl
    - name: media
      mountPath: /media
    extraVolumes:
      - name: ssl
        secret:
          secretName: cert-plex-wl-mort-is
          items:
          - key: keystore.p12
            path: keystore.p12
      - name: media
        persistentVolumeClaim:
          claimName: nas-media
