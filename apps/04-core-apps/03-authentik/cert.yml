apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-auth-mort-is
  namespace: chat
spec:
  secretName: cert-auth-mort-is
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: auth.mort.is
  dnsNames:
  - auth.mort.is
  - auth.wl.mort.is
  - auth.chat.mort.is
