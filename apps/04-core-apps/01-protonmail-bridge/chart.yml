apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: protonmail-bridge
  namespace: mail
spec:
  interval: 12h
  url: oci://oci.trueforge.org/truecharts/protonmail-bridge
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: extract
  ref:
    semver: "*"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: core-apps-protonmail-bridge
  namespace: mail
spec:
  releaseName: protonmail-bridge
  targetNamespace: mail
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: protonmail-bridge
  values:
    image:
      repository: ghcr.io/dancwilliams/protonmail-bridge-docker # {"$imagepolicy": "flux-system:protonmail-bridge-policy:name"}
      tag: v3.24.2 # {"$imagepolicy": "flux-system:protonmail-bridge-policy:tag"}
    persistence:
      config:
        enabled: true
        mountPath: /root
        accessMode: ReadWriteOnce
        size: 200Gi
