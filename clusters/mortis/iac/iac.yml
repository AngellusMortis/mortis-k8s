apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 15m
  storeReadablePlan: human
  approvePlan: auto
  path: ./iac/authentik
  sourceRef:
    kind: GitRepository
    name: flux-system
  writeOutputsToSecret:
    name: tf-authentik-output
  fileMappings:
    - location: "workspace"
      path: ".env"
      secretRef:
        name: authentik-secrets
        key: .env
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: cloudflare
  namespace: flux-system
spec:
  interval: 15m
  storeReadablePlan: human
  approvePlan: auto
  path: ./iac/cloudflare
  sourceRef:
    kind: GitRepository
    name: flux-system
  writeOutputsToSecret:
    name: tf-cloudflare-output
  fileMappings:
    - location: "workspace"
      path: ".env"
      secretRef:
        name: cloudflare-secrets
        key: .env
  varsFrom:
    - kind: Secret
      name: tf-authentik-output
      varsKeys:
        - cloudflare_oidc_client_id
        - cloudflare_oidc_client_secret
